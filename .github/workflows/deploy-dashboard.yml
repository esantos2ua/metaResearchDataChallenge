name: Deploy dashboard to GitHub Pages

# Publishes the static pilot dashboard (dashboard/app) to GitHub Pages.
on:
  push:
    branches: [main]
    paths:
      - "dashboard/app/**"
      - ".github/workflows/deploy-dashboard.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; skip queued runs in favour of the latest.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/app
      - id: deployment
        uses: actions/deploy-pages@v4
